# 루트에서 바로 실행: docker compose up -d
# 실제 정의는 infra/docker-compose.yml에 있음

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - mindcare-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mindcare}
      POSTGRES_USER: ${POSTGRES_USER:-mindcare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindcare_dev_password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mindcare}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mindcare-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data
    networks:
      - mindcare-net

  chromadb:
    image: chromadb/chroma:0.6.3
    ports:
      - "8002:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - mindcare-net

volumes:
  postgres_data:
  redis_data:
  chroma_data:

networks:
  mindcare-net:
    driver: bridge
